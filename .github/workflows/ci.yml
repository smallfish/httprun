name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Unit Tests
        run: go test ./...

      - name: Build CLI
        run: |
          mkdir -p bin
          go build -o bin/httprun ./cmd/httprun

      - name: Run Integration Cases
        run: ./scripts/ci-integration.sh ./bin/httprun
